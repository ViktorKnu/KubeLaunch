apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-demo-frontend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ViktorKnu/KubeLaunch.git
    targetRevision: main
    path: apps/ai-demo/frontend/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

