apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-smoke-test
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ViktorKnu/KubeLaunch.git
    targetRevision: main
    path: apps/cert-manager-smoke-test
  destination:
    server: https://kubernetes.default.svc
    namespace: kubelaunch-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
