apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiworkload-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ViktorKnu/KubeLaunch.git
    targetRevision: main
    path: apps/aiworkload-operator/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: kubelaunch-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
