name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: python -m pip install -e ".[backend,dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run Ruff
        if: matrix.python-version == '3.13'
        run: python -m ruff check .

  platform:
    name: Platform definitions and images
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up kubectl
        uses: Azure/setup-kubectl@v5.1.0
        with:
          version: v1.34.1

      - name: Install validation dependencies
        run: python -m pip install -e ".[dev]"

      - name: Validate YAML documents
        run: python scripts/validate_manifests.py

      - name: Render Kustomize applications
        run: |
          kubectl kustomize apps/platform-smoke-test
          kubectl kustomize apps/keda-smoke-test
          kubectl kustomize apps/ollama
          kubectl kustomize apps/ai-demo/backend/k8s
          kubectl kustomize apps/ai-demo/frontend/k8s
          kubectl kustomize apps/cert-manager-smoke-test
          kubectl kustomize apps/vault-bootstrap
          kubectl kustomize apps/external-secrets-smoke-test
          kubectl kustomize apps/aiworkload-operator/k8s
          kubectl kustomize apps/aiworkload-smoke-test

      - name: Build backend image
        run: docker build --tag kubelaunch-backend:ci apps/ai-demo/backend

      - name: Build frontend image
        run: docker build --tag kubelaunch-frontend:ci apps/ai-demo/frontend

      - name: Build AIWorkload operator image
        run: docker build --tag kubelaunch-aiworkload-operator:ci apps/aiworkload-operator
