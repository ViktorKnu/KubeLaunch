apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-smoke-test
  labels:
    app.kubernetes.io/name: platform-smoke-test
    app.kubernetes.io/part-of: kubelaunch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-smoke-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-smoke-test
        app.kubernetes.io/part-of: kubelaunch
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
