apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: kubelaunch
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/part-of: kubelaunch
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ollama
          image: ollama/ollama:0.31.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 11434
          startupProbe:
            httpGet:
              path: /api/tags
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 3Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
