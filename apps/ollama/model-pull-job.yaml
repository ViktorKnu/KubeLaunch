apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-tinyllama
  labels:
    app.kubernetes.io/name: ollama-model-pull
    app.kubernetes.io/part-of: kubelaunch
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-model-pull
        app.kubernetes.io/part-of: kubelaunch
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: model-pull
          image: ollama/ollama:0.31.1
          imagePullPolicy: IfNotPresent
          args:
            - pull
            - tinyllama
          env:
            - name: OLLAMA_HOST
              value: http://ollama:11434
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
