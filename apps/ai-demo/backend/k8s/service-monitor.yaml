apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-demo-backend
  labels:
    app.kubernetes.io/name: ai-demo-backend
    app.kubernetes.io/part-of: kubelaunch
    release: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-demo-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
