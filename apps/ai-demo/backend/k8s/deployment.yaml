apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-demo-backend
  labels:
    app.kubernetes.io/name: ai-demo-backend
    app.kubernetes.io/part-of: kubelaunch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-demo-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-demo-backend
        app.kubernetes.io/part-of: kubelaunch
    spec:
      automountServiceAccountToken: false
      containers:
        - name: backend
          image: kubelaunch-backend:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: OLLAMA_MODEL
              value: tinyllama
            - name: OLLAMA_TIMEOUT_SECONDS
              value: "120"
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
