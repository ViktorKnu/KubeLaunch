apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-demo-frontend
  labels:
    app.kubernetes.io/name: ai-demo-frontend
    app.kubernetes.io/part-of: kubelaunch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-demo-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-demo-frontend
        app.kubernetes.io/part-of: kubelaunch
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: kubelaunch-frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

