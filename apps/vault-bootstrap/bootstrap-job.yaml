apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap
  labels:
    app.kubernetes.io/name: vault-bootstrap
    app.kubernetes.io/part-of: kubelaunch
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-bootstrap
        app.kubernetes.io/part-of: kubelaunch
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: vault-bootstrap
          image: hashicorp/vault:2.0.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until vault status >/dev/null 2>&1; do sleep 2; done
              vault kv put secret/kubelaunch/demo message="Secret hentet fra lokal Vault"
          env:
            - name: VAULT_ADDR
              value: http://vault.vault.svc.cluster.local:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-dev-token
                  key: token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
