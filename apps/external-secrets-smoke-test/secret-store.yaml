apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault
  labels:
    app.kubernetes.io/name: external-secrets-smoke-test
    app.kubernetes.io/part-of: kubelaunch
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: vault-dev-token
          key: token
