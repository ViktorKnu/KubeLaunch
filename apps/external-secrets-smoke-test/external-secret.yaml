apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kubelaunch-vault-demo
  labels:
    app.kubernetes.io/name: external-secrets-smoke-test
    app.kubernetes.io/part-of: kubelaunch
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: kubelaunch-vault-demo
    creationPolicy: Owner
  data:
    - secretKey: message
      remoteRef:
        key: kubelaunch/demo
        property: message
